version: '3.8'

services:
  retrieval-playground:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retrieval-playground-workshop
    ports:
      - "8888:8888"
    volumes:
      # Mount the notebooks directory for live editing
      - ./retrieval_playground/tutorial:/workspace/retrieval_playground/tutorial
      # Mount source code so fixes apply without rebuilding the image
      - ./retrieval_playground/src:/workspace/retrieval_playground/src
      # Mount utils (ragas compat patch) and package init
      - ./retrieval_playground/utils:/workspace/retrieval_playground/utils
      - ./retrieval_playground/__init__.py:/workspace/retrieval_playground/__init__.py
      # Mount repo-root data (test sets, workshop PDFs, results)
      - ./data:/workspace/data
      # Legacy package data path (sample papers bundled with the package)
      - ./retrieval_playground/data:/workspace/retrieval_playground/data
      # Mount .env file if it exists
      - ./.env:/workspace/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    stdin_open: true
    tty: true
